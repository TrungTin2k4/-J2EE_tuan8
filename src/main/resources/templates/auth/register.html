<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org"
    layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
</head>

<body>
    <div layout:fragment="content" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h2 class="mb-2">Đăng ký tài khoản USER</h2>
                        <p class="text-muted mb-4">Tài khoản đăng ký mới sẽ có quyền USER để mua hàng và checkout.</p>

                        <form th:action="@{/register}" th:object="${registerRequest}" method="post"
                            class="d-flex flex-column gap-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div>
                                <label for="loginName" class="form-label">Tên đăng nhập</label>
                                <input type="text" id="loginName" th:field="*{loginName}" class="form-control"
                                    placeholder="Ví dụ: nguyenvanA">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('loginName')}"
                                    th:errors="*{loginName}"></div>
                            </div>

                            <div>
                                <label for="password" class="form-label">Mật khẩu</label>
                                <input type="password" id="password" th:field="*{password}" class="form-control"
                                    placeholder="Tối thiểu 6 ký tự">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></div>
                            </div>

                            <div>
                                <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                    class="form-control" placeholder="Nhập lại mật khẩu">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('confirmPassword')}"
                                    th:errors="*{confirmPassword}"></div>
                            </div>

                            <button type="submit" class="btn btn-success">Tạo tài khoản USER</button>
                        </form>

                        <div class="mt-3">
                            Đã có tài khoản?
                            <a th:href="@{/login}" class="fw-semibold text-decoration-none">Quay lại đăng nhập</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
