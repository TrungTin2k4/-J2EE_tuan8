<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>

<body>
    <div layout:fragment="content" class="container py-4">
        <h2 class="mb-4">Thêm sản phẩm</h2>
        <form th:action="@{/products/save}" th:object="${product}" method="post" class="form"
            enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group mb-3">
                <label for="name">Tên sản phẩm:</label>
                <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="form-group mb-3">
                <label for="imageProduct">Hình ảnh:</label>
                <input class="form-control" type="file" id="imageProduct" name="imageProduct"
                    accept="image/png,image/jpeg">
            </div>
            <div class="form-group mb-3">
                <label for="price">Giá:</label>
                <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
            <div class="form-group mb-3">
                <label for="category">Danh mục:</label>
                <select th:field="*{category.id}" class="form-control" id="category">
                    <option value="0">Chọn danh mục</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">
                    </option>
                </select>
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('category.id')}" th:errors="*{category.id}"></div>
            </div>
            <br />
            <button type="submit" class="btn btn-success">Lưu sản phẩm</button>
        </form>
    </div>
</body>

</html>
